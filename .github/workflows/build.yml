name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Work around npm 10.x "Exit handler never called!" crash on the runner.
      - run: npm install -g npm@latest

      # keytar (optional dep of vsce) builds a native module and is only needed
      # for `vsce publish`, not for packaging.
      - run: npm ci --no-audit --no-fund --omit=optional

      - run: npm run check-types

      - run: npm run vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: bash-runner-vsix
          path: bash-runner.vsix

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bash-runner.vsix
